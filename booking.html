<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上掛號 - 舒眠身心醫學診所</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; background-color: #f8fafc; }
        .form-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #334155; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; }
        button { background-color: #2563eb; color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background-color: #1d4ed8; }
        #message { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; }
        .success { background-color: #dff0d8; color: #3c763d; border: 1px solid #d6e9c6; }
        .error { background-color: #f2dede; color: #a94442; border: 1px solid #ebccd1; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2 style="text-align: center; color: #1e293b;">線上掛號預約</h2>
        <form id="bookingForm">
            <div class="form-group">
                <label>姓名</label>
                <input type="text" id="patient_name" required>
            </div>
            <div class="form-group">
                <label>電話</label>
                <input type="tel" id="phone" required>
            </div>
            <div class="form-group">
                <label>預約日期</label>
                <input type="date" id="date" required min="2026-04-07">
            </div>
            <div class="form-group">
                <label>時段</label>
                <select id="time_slot">
                    <option value="morning">早診 (09:00 - 12:00)</option>
                    <option value="afternoon">午診 (14:00 - 17:00)</option>
                    <option value="evening">晚診 (18:00 - 21:00)</option>
                </select>
            </div>
            <div class="form-group">
                <label>主要症狀說明</label>
                <textarea id="symptoms" rows="3"></textarea>
            </div>
            <button type="submit" id="submitBtn">送出掛號</button>
        </form>
        <div id="message"></div>
    </div>

<script>
        // 等待網頁元素全部載入後再執行，確保不會找不到按鈕
        document.addEventListener('DOMContentLoaded', () => {
            const bookingForm = document.getElementById('bookingForm');
            const messageDiv = document.getElementById('message');
            const submitBtn = document.getElementById('submitBtn');

            if (!bookingForm) return;

            bookingForm.addEventListener('submit', async (e) => {
                // 【防彈機制 1】絕對優先：攔截表單的預設跳轉行為！
                e.preventDefault();
                
                // 改變按鈕狀態，避免病患狂按
                submitBtn.disabled = true;
                submitBtn.innerText = "安全連線處理中...";
                messageDiv.style.display = 'none';

                try {
                    // 取得病患填寫的資料
                    const name = document.getElementById('patient_name').value;
                    const phone = document.getElementById('phone').value;
                    const date = document.getElementById('date').value;
                    const time_slot = document.getElementById('time_slot').value;
                    function validateSchedule() {
            if (!dateInput.value || !timeSlotSelect.value) return;

            const selectedDate = new Date(dateInput.value);
            const dayOfWeek = selectedDate.getDay(); // 0 是星期日, 1 是星期一, 2 是星期二...以此類推
            const timeSlot = timeSlotSelect.value;

            // 1. 阻擋星期日 (全天休診)
            if (dayOfWeek === 0) {
                alert("星期日為診所固定休診日，請為自己挑選其他日期喔！");
                dateInput.value = ""; // 強制清空日期
                return;
            }

            // 2. 阻擋星期二「下午」 (院長於榮總看診)
            if (dayOfWeek === 2 && timeSlot === "afternoon") {
                alert("洪院長星期二下午於臺北榮總看診，本診所該時段休診。請選擇星期二的早診/晚診，或其他日期。");
                timeSlotSelect.value = ""; // 強制清空時段
                return;
            }

            // 3. 星期六「隔週看診」溫馨提醒 (不阻擋，但跳出提醒)
            if (dayOfWeek === 6) {
                // 使用 confirm 讓病患確認，按「確定」保留，按「取消」清空
                const confirmSaturday = confirm("溫馨提醒：本診所星期六採【隔週看診制】。\n\n請確認您選擇的日期是診所有開診的週次。若不確定，可點擊『取消』並先來電確認，或點擊『確定』繼續送出，我們將有專人與您聯繫確認。");
                if (!confirmSaturday) {
                    dateInput.value = ""; 
                }
            }
        }



                    
                    const symptoms = document.getElementById('symptoms').value;

                    // 時段中文化
                    let timeSlotText = "";
                    if (time_slot === 'morning') timeSlotText = '早診 (09:00 - 12:00)';
                    else if (time_slot === 'afternoon') timeSlotText = '午診 (14:00 - 17:00)';
                    else timeSlotText = '晚診 (18:00 - 21:00)';

                    let emailSuccess = false;
                    let dbSuccess = false;

                    // ==========================================
                    // 【防彈機制 2】動作 A：背景發送 Email 通知
                    // ==========================================
                    try {
                        const emailResponse = await fetch("https://formsubmit.co/ajax/soothing.sleep.mind@gmail.com", {
                            method: "POST",
                            headers: { 
                                'Content-Type': 'application/json',
                                'Accept': 'application/json'
                            },
                            body: JSON.stringify({
                                "病患姓名": name,
                                "聯絡電話": phone,
                                "預約日期": date,
                                "預約時段": timeSlotText,
                                "症狀說明": symptoms,
                                "_subject": "🔔【診所網站】有新的線上預約單！"
                            })
                        });
                        if (emailResponse.ok) emailSuccess = true;
                    } catch (emailErr) {
                        console.error("Email 發送遭遇障礙:", emailErr);
                    }

                    // ==========================================
                    // 【防彈機制 3】動作 B：儲存至 Supabase 資料庫
                    // ==========================================
                    try {
                        const SUPABASE_URL = 'https://drrgysqembjwulmbdium.supabase.co'; 
                        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRycmd5c3FlbWJqd3VsbWJkaXVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzMDQ1OTksImV4cCI6MjA4NTg4MDU5OX0._uchZy85H9Io6hg6eGzmhnfUJbwjdzIuJupUy6li8n4'; 
                        
                        // 檢查資料庫套件是否有成功載入
                        if (typeof supabase !== 'undefined') {
                            const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                            const { error } = await _supabase.from('appointments').insert([{
                                patient_name: name,
                                phone: phone,       
                                booking_date: date, 
                                time_slot: time_slot,
                                symptoms: symptoms 
                            }]);
                            if (!error) dbSuccess = true;
                        }
                    } catch (dbErr) {
                        console.error("資料庫連線遭遇障礙:", dbErr);
                    }

                    // ==========================================
                    // 最終結算與畫面顯示
                    // ==========================================
                    messageDiv.style.display = 'block';
                    
                    // 只要「Email有寄出」或「資料庫有存入」其中一個成功，就當作成功！
                    if (emailSuccess || dbSuccess) {
                        messageDiv.className = 'success';
                        messageDiv.innerHTML = '<h3>✅ 掛號資料已成功送出！</h3><p>診所人員將盡快與您聯繫確認。</p>';
                        bookingForm.reset();
                        submitBtn.innerText = "預約已完成";
                    } else {
                        throw new Error("網路連線阻擋");
                    }

                } catch (error) {
                    messageDiv.style.display = 'block';
                    messageDiv.className = 'error';
                    messageDiv.innerHTML = '<h3>❌ 送出失敗</h3><p>網路連線不穩，請稍後再試，或直接來電診所預約。</p>';
                    submitBtn.disabled = false;
                    submitBtn.innerText = "重新送出";
                }
            });
        });
    </script>
    
</body>

</html>
