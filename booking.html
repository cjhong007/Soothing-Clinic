<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上掛號 - 舒眠身心醫學診所</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; background-color: #f8fafc; }
        .form-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #334155; }
        .optional-tag { color: #64748b; font-size: 0.9em; font-weight: normal; margin-left: 4px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; }
        /* 當選單被鎖住時的樣式 */
        select:disabled { background-color: #f1f5f9; color: #94a3b8; cursor: not-allowed; }
        button { background-color: #2563eb; color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background-color: #1d4ed8; }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; }
        #message { margin-top: 20px; padding: 20px; border-radius: 6px; display: none; text-align: center; }
        .success { background-color: #ffffff; border: 2px solid #10b981; }
        .error { background-color: #f2dede; color: #a94442; border: 1px solid #ebccd1; }
        
        .back-link { display: inline-block; margin-bottom: 15px; color: #64748b; text-decoration: none; font-size: 14px; font-weight: bold; transition: color 0.2s; }
        .back-link:hover { color: #2563eb; text-decoration: underline; }
        .btn-home { display: inline-block; margin-top: 15px; padding: 10px 20px; background-color: #10b981; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; transition: background-color 0.2s; }
        .btn-home:hover { background-color: #059669; }
        
        .receipt-card { background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin: 15px 0; text-align: left; }
        .receipt-item { margin-bottom: 8px; font-size: 15px; color: #334155; }
        .receipt-item strong { color: #0f172a; display: inline-block; width: 80px; }
    </style>
</head>
<body>
    <div class="form-card">
        <a href="index.html" class="back-link">&larr; 返回診所首頁</a>
        <h2 style="text-align: center; color: #1e293b; margin-top: 0;">線上掛號預約</h2>
        
        <form id="bookingForm">
            <div class="form-group">
                <label>姓名</label>
                <input type="text" id="patient_name" required placeholder="請輸入您的姓名">
            </div>
            <div class="form-group">
                <label>電話</label>
                <input type="tel" id="phone" required placeholder="例如: 0912345678">
            </div>
            <div class="form-group">
                <label>電子信箱 <span class="optional-tag">(選填)</span></label>
                <input type="email" id="email" placeholder="若無信箱可直接跳過">
            </div>
            <div class="form-group">
                <label>預約日期</label>
                <input type="date" id="date" required min="2026-04-07">
            </div>
            <div class="form-group">
                <label>時段 <span class="optional-tag" style="color:#ef4444;" id="slot_hint"></span></label>
                <select id="time_slot" required disabled>
                    <option value="">請先選擇上方預約日期</option>
                </select>
            </div>
            <div class="form-group">
                <label>主要症狀說明 <span class="optional-tag">(選填)</span></label>
                <textarea id="symptoms" rows="3" placeholder="請簡述您的困擾，以利醫師評估..."></textarea>
            </div>
            <button type="submit" id="submitBtn">送出掛號</button>
        </form>
        <div id="message"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const bookingForm = document.getElementById('bookingForm');
            const messageDiv = document.getElementById('message');
            const submitBtn = document.getElementById('submitBtn');
            const dateInput = document.getElementById('date');
            const timeSlotSelect = document.getElementById('time_slot');
            const slotHint = document.getElementById('slot_hint');

            if (!bookingForm) return;

            // ==========================================
            // 診所各日期的看診時段設定庫
            // ==========================================
            const clinicSchedule = {
                1: [ // 星期一
                    { value: 'morning', text: '上午診 (09:00 - 12:00)' },
                    { value: 'evening', text: '晚上診 (5:00 - 8:00)' }
                ],
                3: [ // 星期三
                    { value: 'morning', text: '上午診 (9:00 - 12:00)' },
                    { value: 'evening', text: '晚上診 (5:00 - 8:00)' }
                ],
                4: [ // 星期四
                    { value: 'afternoon', text: '下午診 (14:00 - 16:00)' },
                    { value: 'evening', text: '晚上診 (5:00 - 8:00)' }
                ],
                5: [ // 星期五
                    { value: 'morning', text: '上午診 (09:00 - 12:00)' },
                    { value: 'afternoon', text: '下午診 (14:00 - 16:00)' }
                ],
                6: [ // 星期六
                    { value: 'morning', text: '上午診 (09:00 - 12:00)' }
                ]
            };

            // ==========================================
            // 自動更新時段選單的函數
            // ==========================================
            function updateAvailableSlots() {
                // 清空現有選項
                timeSlotSelect.innerHTML = '';
                
                if (!dateInput.value) {
                    timeSlotSelect.innerHTML = '<option value="">請先選擇上方預約日期</option>';
                    timeSlotSelect.disabled = true;
                    slotHint.innerText = "";
                    return;
                }

                const selectedDate = new Date(dateInput.value);
                const dayOfWeek = selectedDate.getDay(); 

                // 如果是診所有開的日子
                if (clinicSchedule[dayOfWeek]) {
                    timeSlotSelect.disabled = false;
                    slotHint.innerText = ""; // 清除提示
                    
                    // 動態載入當天專屬的時段
                    clinicSchedule[dayOfWeek].forEach(slot => {
                        const option = document.createElement('option');
                        option.value = slot.value;
                        option.text = slot.text;
                        timeSlotSelect.appendChild(option);
                    });
                } else {
                    // 如果被強制選到了沒開的日子 (雖然下方有擋，但保險起見)
                    timeSlotSelect.innerHTML = '<option value="">本日無門診，請選擇其他日期</option>';
                    timeSlotSelect.disabled = true;
                }
            }

            // ==========================================
            // 日期防呆與連動觸發
            // ==========================================
            function validateSchedule() {
                if (!dateInput.value) {
                    updateAvailableSlots();
                    return;
                }

                const selectedDate = new Date(dateInput.value);
                const dayOfWeek = selectedDate.getDay(); 

                if (dayOfWeek === 0) {
                    alert("星期日為診所固定休診日，請為自己挑選其他日期喔！");
                    dateInput.value = ""; 
                } else if (dayOfWeek === 2) {
                    alert("洪院長星期二於臺北榮總看診，本診所星期二全天休診。請選擇其他日期喔！");
                    dateInput.value = ""; 
                } else if (dayOfWeek === 6) {
                    const confirmSaturday = confirm("溫馨提醒：本診所星期六採【隔週看診制】。\n\n請確認您選擇的日期是診所有開診的週次。若不確定，可點擊『取消』並先來電確認，或點擊『確定』繼續保留，我們將有專人與您聯繫確認。");
                    if (!confirmSaturday) {
                        dateInput.value = ""; 
                    }
                }
                
                // 檢查完日期後，立刻更新對應的時段選單
                updateAvailableSlots();
            }

            dateInput.addEventListener('change', validateSchedule);

            // ==========================================
            // 表單送出處理
            // ==========================================
            bookingForm.addEventListener('submit', async (e) => {
                e.preventDefault(); 
                
                if (!dateInput.value || !timeSlotSelect.value) {
                    alert("請確保已選擇正確的看診日期與時段！");
                    return;
                }
                
                submitBtn.disabled = true;
                submitBtn.innerText = "安全連線處理中...";
                messageDiv.style.display = 'none';

                try {
                    const name = document.getElementById('patient_name').value;
                    const phone = document.getElementById('phone').value;
                    const rawEmail = document.getElementById('email').value; 
                    const date = dateInput.value;
                    const time_slot = timeSlotSelect.value;
                    const symptoms = document.getElementById('symptoms').value;

                    const emailForNotify = rawEmail.trim() !== "" ? rawEmail : "未提供";

                    // 抓取被選中時段的「中文顯示文字」給通知信和明細用
                    const timeSlotText = timeSlotSelect.options[timeSlotSelect.selectedIndex].text;

                    let emailSuccess = false;
                    let dbSuccess = false;

                    try {
                        const emailResponse = await fetch("https://formsubmit.co/ajax/f6fe5bd024f8a65d910e54b14f81a2c1", {
                            method: "POST",
                            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                            body: JSON.stringify({
                                "病患姓名": name,
                                "聯絡電話": phone,
                                "電子信箱": emailForNotify, 
                                "預約日期": date,
                                "預約時段": timeSlotText,
                                "症狀說明": symptoms || "未提供",
                                "_subject": "🔔【診所網站】有新的線上預約單！"
                            })
                        });
                        if (emailResponse.ok) emailSuccess = true;
                    } catch (emailErr) {
                        console.error("Email 發送遭遇障礙:", emailErr);
                    }

                    try {
                        const SUPABASE_URL = 'https://drrgysqembjwulmbdium.supabase.co'; 
                        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRycmd5c3FlbWJqd3VsbWJkaXVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzMDQ1OTksImV4cCI6MjA4NTg4MDU5OX0._uchZy85H9Io6hg6eGzmhnfUJbwjdzIuJupUy6li8n4'; 
                        
                        if (typeof supabase !== 'undefined') {
                            const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                            const { error } = await _supabase.from('appointments').insert([{
                                patient_name: name,
                                phone: phone, 
                                email: rawEmail, 
                                booking_date: date, 
                                time_slot: time_slot,
                                symptoms: symptoms 
                            }]);
                            if (!error) dbSuccess = true;
                        }
                    } catch (dbErr) {
                        console.error("資料庫連線遭遇障礙:", dbErr);
                    }

                    messageDiv.style.display = 'block';
                    
                    if (emailSuccess || dbSuccess) {
                        messageDiv.className = 'success';
                        
                        messageDiv.innerHTML = `
                            <h3 style="color: #10b981; font-size: 1.5rem; margin-top: 0; margin-bottom: 10px;">✅ 掛號資料已送出！</h3>
                            <p style="color: #64748b; margin-bottom: 15px;">診所人員將盡快與您聯繫確認。以下為您的預約明細：</p>
                            
                            <div class="receipt-card">
                                <div class="receipt-item"><strong>病患姓名：</strong> ${name}</div>
                                <div class="receipt-item"><strong>聯絡電話：</strong> ${phone}</div>
                                <div class="receipt-item"><strong>預約日期：</strong> ${date}</div>
                                <div class="receipt-item"><strong>預約時段：</strong> ${timeSlotText}</div>
                            </div>

                            <p style="color: #ef4444; font-size: 0.9rem; margin: 15px 0; font-weight: bold;">
                                ⚠️ 若需取消或更改時間，請於營業時間來電 02-2821-4412 由專人為您服務。
                            </p>
                            
                            <a href="index.html" class="btn-home">回診所首頁</a>
                        `;
                        
                        bookingForm.style.display = 'none'; 
                    } else {
                        throw new Error("網路連線阻擋");
                    }

                } catch (error) {
                    messageDiv.style.display = 'block';
                    messageDiv.className = 'error';
                    messageDiv.innerHTML = '<h3>❌ 送出失敗</h3><p>網路連線不穩，請稍後再試，或直接來電診所預約。</p>';
                    submitBtn.disabled = false;
                    submitBtn.innerText = "重新送出";
                }
            });
        });
    </script>
</body>
</html>
