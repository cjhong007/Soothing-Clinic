name: Supabase Keep Alive

on:
  schedule:
    # 每週一與週四凌晨執行，確保 7 天內有活動
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # 允許您在 Actions 分頁手動點擊執行測試

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Send a Ping Request to Supabase
        run: |
          curl -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/get_server_time" \
          -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
          -H "Content-Type: application/json"
