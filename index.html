<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舒眠身心醫學診所 - 首頁</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; margin: 0; padding: 20px; }
        
        /* 診所環境區塊 */
        .clinic-section { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .clinic-section h2 { text-align: center; color: #1e293b; font-size: 28px; margin-bottom: 40px; }
        
        .image-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        
        /* 升級後的圖片外觀 */
        .grid-item { 
            position: relative; 
            border-radius: 8px; 
            overflow: hidden; 
            cursor: pointer; /* 滑鼠游標變成手指 */
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            transition: transform 0.3s ease; /* 增加滑過時的微縮放效果 */
        }
        .grid-item:hover { transform: scale(1.03); } /* 滑過時放大，暗示可以點擊 */
        
        .grid-item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
        }
        
        /* 圖片下方說明 */
        .image-caption { 
            background-color: white; 
            padding: 15px; 
            color: #334155; 
            font-weight: 500; 
            border-top: 1px solid #e2e8f0; 
        }

        /* 👇 全新的 Lightbox 放大模組 👇 */
        .lightbox-modal {
            display: none; /* 預設隱藏 */
            position: fixed;
            z-index: 1000; /* 最上層 */
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.9); /* 半透明暗色背景 */
            backdrop-blur: 5px; /* 背景模糊效果 */
            overflow: auto; /* 允許垂直捲動 */
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 放大後的圖片本體 */
        .lightbox-content {
            display: block;
            margin: auto;
            max-width: 90%; /* 限制寬度 */
            max-height: 85%; /* 限制高度，保留空間給關閉按鈕 */
            border-radius: 6px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            object-fit: contain; /* 確保圖片不變形 */
        }

        /* 關閉按鈕 (✕) */
        .lightbox-close {
            position: absolute;
            top: 15px;
            right: 25px;
            color: #f1f5f9;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
        }
        .lightbox-close:hover { color: #ffffff; }

    </style>
</head>
<body>
    
    <div class="clinic-section">
        <h2 id="environment">診所環境</h2>
        
        <div class="image-grid">
            <div class="grid-item" onclick="openLightbox('images/environment_frontdesk.jpg')">
                <img src="images/environment_frontdesk.jpg" alt="舒眠身心醫學診所 - 親切櫃檯與候診區">
                <div class="image-caption">親切櫃檯與候診區</div>
            </div>
            
            <div class="grid-item" onclick="openLightbox('images/environment_consulting1.jpg')">
                <img src="images/environment_consulting1.jpg" alt="舒眠身心醫學診所 - 舒適諮詢室">
                <div class="image-caption">舒適諮詢室 (諮詢/治療)</div>
            </div>
            
            <div class="grid-item" onclick="openLightbox('images/environment_hall.jpg')">
                <img src="images/environment_hall.jpg" alt="舒眠身心醫學診所 - 大廳與衛教專區">
                <div class="image-caption">大廳與衛教專區</div>
            </div>
            
            </div>
    </div>

    <div id="lightboxModal" class="lightbox-modal">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <img class="lightbox-content" id="lightboxImage">
    </div>

    <script>
        // ==========================================
        // 開啟 Lightbox 放大圖片
        // ==========================================
        function openLightbox(imageSrc) {
            const modal = document.getElementById('lightboxModal');
            const modalImg = document.getElementById('lightboxImage');
            
            modal.style.display = 'flex'; // 用 flex 讓圖片置中
            modalImg.src = imageSrc; // 替換圖片來源
            
            // 鎖定背景不讓其捲動
            document.body.style.overflow = 'hidden';
        }

        // ==========================================
        // 關閉 Lightbox
        // ==========================================
        function closeLightbox() {
            const modal = document.getElementById('lightboxModal');
            
            modal.style.display = 'none'; // 隱藏
            
            // 恢復背景捲動
            document.body.style.overflow = 'auto';
        }

        // ==========================================
        // 額外功能：點擊背景暗處也能關閉
        // ==========================================
        window.onclick = function(event) {
            const modal = document.getElementById('lightboxModal');
            if (event.target === modal) {
                closeLightbox();
            }
        }
        
        // 額外功能：按 ESC 鍵也能關閉
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
