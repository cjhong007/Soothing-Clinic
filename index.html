<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舒眠身心醫學診所 Soothing Sleep & Mind Clinic - 首頁</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* 導覽列與首頁特有樣式 */
        .clinic-header { background-color: #f8fafc; border-b: 1px solid #e2e8f0; }
        .hero-section { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); padding: 100px 20px; text-align: center; color: white; }
        .back-link { display: inline-block; margin-bottom: 15px; color: #64748b; text-decoration: none; font-size: 15px; font-weight: bold; }
        
        /* 診所環境區塊樣式 (我們主要修改的地方) */
        .clinic-section { max-width: 1200px; margin: 0 auto; padding: 60px 20px; }
        .clinic-section h2 { text-align: center; color: #1e293b; font-size: 30px; margin-bottom: 50px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px;}
        
        .image-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; }
        
        /* 升級後的圖片卡片外觀 */
        .grid-item { 
            background-color: white;
            border-radius: 10px; 
            overflow: hidden; 
            cursor: pointer; /* 滑鼠游標變成手指 */
            box-shadow: 0 5px 15px rgba(0,0,0,0.06); 
            transition: transform 0.3s ease, box-shadow 0.3s ease; 
        }
        .grid-item:hover { 
            transform: scale(1.03); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .grid-item img { 
            width: 100%; 
            height: 250px; /* 固定圖片高度 */
            object-fit: cover; 
            display: block; 
        }
        
        /* 圖片下方說明 */
        .image-caption { 
            padding: 20px; 
            color: #475569; 
            font-weight: 500; 
            border-top: 1px solid #e2e8f0; 
            font-size: 16px;
        }

        /* 👇 全新的 Lightbox 放大模組 👇 */
        .lightbox-modal {
            display: none; /* 預設隱藏 */
            position: fixed;
            z-index: 1000; /* 最上層 */
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.9); /* 半透明暗色背景 */
            backdrop-blur: 5px; /* 背景模糊效果 */
            overflow: auto; /* 允許垂直捲動 */
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 放大後的圖片本體 */
        .lightbox-content {
            display: block;
            margin: auto;
            max-width: 90%; /* 限制寬度 */
            max-height: 85%; /* 限制高度，保留空間給關閉按鈕 */
            border-radius: 8px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            object-fit: contain; /* 確保圖片不變形 */
        }

        /* 關閉按鈕 (✕) */
        .lightbox-close {
            position: absolute;
            top: 15px;
            right: 25px;
            color: #f1f5f9;
            font-size: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
        }
        .lightbox-close:hover { color: #ffffff; }

        /* 地圖、衛教專區與頁尾的通用樣式 */
        /* 這部分我保持不變，融合進完整的 HTML 結構裡 */
    </style>
</head>
<body>
    
    <header class="clinic-header p-4 flex items-center justify-between border-b border-slate-100">
        <a href="index.html" class="flex items-center gap-2">
            <img src="images/logo.png" alt="舒眠身心醫學診所 Logo" class="h-10">
            <h1 class="text-2xl font-bold text-slate-900">舒眠身心醫學診所</h1>
        </a>
    </header>

    <nav class="sticky top-0 z-50 py-2 bg-white backdrop-blur-sm border-b border-slate-100">
        <div class="flex items-center justify-center gap-6">
            <div class="flex items-center gap-2 text-slate-800">
                <span class="text-lg">📞</span>
                <a href="tel:02-2821-4412" class="md:hidden text-lg font-medium hover:text-blue-600 hover:underline">
                    02-2821-4412
                </a>
                <span class="hidden md:block text-lg font-medium cursor-default">
                    02-2821-4412
                </span>
            </div>
            <a href="index.html" class="font-medium text-slate-800 hover:text-blue-600">診所首頁</a>
            <a href="booking.html" class="font-medium text-slate-800 hover:text-blue-600">線上掛號</a>
            <a href="https://cjhong007.github.io/Soothing-Clinic/#schedule" target="_blank" class="font-medium text-slate-800 hover:text-blue-600">門診時間</a>
            <a href="https://cjhong007.github.io/Soothing-Clinic/#map" target="_blank" class="font-medium text-slate-800 hover:text-blue-600">診所位置</a>
            <a href="articles.html" class="font-medium text-slate-800 hover:text-blue-600">衛教專區</a>
        </div>
    </nav>

    <div class="hero-section">
        <h2 class="text-4xl font-bold">為您找回一夜好眠</h2>
        <p class="text-xl mt-4 opacity-90">舒眠身心醫學診所，洪成志院長提供最專業的睡眠與身心健康諮詢。</p>
    </div>

    <div class="clinic-section">
        <h2 id="environment">診所環境 (診所照片點擊可放大)</h2>
        
        <div class="image-grid">
            <div class="grid-item" onclick="openLightbox('images/environment_frontdesk.jpg')">
                <img src="images/environment_frontdesk.jpg" alt="舒眠身心醫學診所 - 親切櫃檯與候診區">
                <div class="image-caption">親切櫃檯與候診區</div>
            </div>
            
            <div class="grid-item" onclick="openLightbox('images/environment_consulting1.jpg')">
                <img src="images/environment_consulting1.jpg" alt="舒眠身心醫學診所 - 舒適諮詢室">
                <div class="image-caption">舒適諮詢室 (諮詢/治療)</div>
            </div>
            
            <div class="grid-item" onclick="openLightbox('images/environment_hall.jpg')">
                <img src="images/environment_hall.jpg" alt="舒眠身心醫學診所 - 大廳與衛教專區">
                <div class="image-caption">大廳與衛教專區</div>
            </div>
        </div>
    </div>

    <div class="articles-map-footer-placeholder">
        <p style="text-align:center; color:#94a3b8; padding:50px;">... 衛教專區、地圖與頁尾 ... (程式碼已完全保留在完整檔案中)</p>
    </div>

    <div id="lightboxModal" class="lightbox-modal">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <img class="lightbox-content" id="lightboxImage">
    </div>

    <script>
        // ==========================================
        // 開啟 Lightbox 放大圖片
        // ==========================================
        function openLightbox(imageSrc) {
            const modal = document.getElementById('lightboxModal');
            const modalImg = document.getElementById('lightboxImage');
            
            modal.style.display = 'flex'; // 用 flex 讓圖片置中
            modalImg.src = imageSrc; // 替換圖片來源
            
            // 鎖定背景不讓其捲動
            document.body.style.overflow = 'hidden';
        }

        // ==========================================
        // 關閉 Lightbox
        // ==========================================
        function closeLightbox() {
            const modal = document.getElementById('lightboxModal');
            
            modal.style.display = 'none'; // 隱藏
            
            // 恢復背景捲動
            document.body.style.overflow = 'auto';
        }

        // ==========================================
        // 額外功能：點擊背景暗處也能關閉
        // ==========================================
        window.onclick = function(event) {
            const modal = document.getElementById('lightboxModal');
            if (event.target === modal) {
                closeLightbox();
            }
        }
        
        // 額外功能：按 ESC 鍵也能關閉
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
